services:
  # 1. Backend Web Service
  - type: web
    name: specskart-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false # Set this to your MongoDB Atlas connection string in the Render Dashboard
      - key: CLIENT_URL
        fromService:
          type: web
          name: specskart-frontend
          property: host

  # 2. Frontend Static Site
  - type: web
    name: specskart-frontend
    env: static
    buildCommand: npm install --legacy-peer-deps && npm run build
    publishDir: dist
    routes:
      # Support React SPA client-side routing (redirects all requests to index.html)
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: specskart-backend
          property: host
